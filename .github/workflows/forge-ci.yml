name: FORGE CI
on: [push]
jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build FORGE
        run: cargo build --release
      - name: Run tests
        run: cargo test --release
      - name: Run FORGE CI agent
        env:
          FORGE_API_KEY: ${{ secrets.FORGE_API_KEY }}
        run: |
          if [ -n "$FORGE_API_KEY" ]; then
            ./target/release/forge-cli --ci --prompt "fix any bugs or warnings"
          else
            echo "⊘ CI agent skipped — set FORGE_API_KEY secret to enable"
          fi
